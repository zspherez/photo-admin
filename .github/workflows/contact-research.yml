name: Research artist managers

on:
  schedule:
    # Poll existing queued work every 10 minutes without refreshing discovery.
    - cron: "*/10 * * * *"
    # Refresh artist/show eligibility hourly, then drain resulting work.
    - cron: "23 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  copilot-requests: write
  id-token: write

concurrency:
  group: >-
    ${{
      (github.event_name == 'workflow_dispatch' || github.event.schedule == '23 * * * *')
        && 'photo-admin-contact-research-refresh'
        || 'photo-admin-contact-research-poll'
    }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      claimable: ${{ steps.queue.outputs.claimable }}
      workers: ${{ steps.queue.outputs.workers }}
    steps:
      - name: Prepare manager research queue
        id: queue
        shell: bash
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          REFRESH_QUEUE: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '23 * * * *' }}
        run: |
          set -euo pipefail

          if [[ -z "${APP_BASE_URL}" ]]; then
            echo "::error::APP_BASE_URL repository secret is required"
            exit 1
          fi

          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          separator="?"
          if [[ "${oidc_url}" == *"?"* ]]; then
            separator="&"
          fi
          oidc_token="$(
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              --header "Accept: application/json" \
              "${oidc_url}${separator}audience=photo-admin-contact-research" |
              jq -er '.value | select(type == "string" and length > 0)'
          )"
          echo "::add-mask::${oidc_token}"

          claimable="$(
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --connect-timeout 15 \
              --max-time 120 \
              --request POST \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer ${oidc_token}" \
              --header "Accept: application/json" \
              --data "$(jq -cn --argjson refreshQueue "${REFRESH_QUEUE}" '{refreshQueue: $refreshQueue}')" \
              "${APP_BASE_URL%/}/api/contact-research/prepare" |
              jq -er '
                .claimable |
                if type == "number" and . >= 0 and floor == .
                then .
                else error("invalid claimable count")
                end
              '
          )"
          lane_count="${claimable}"
          if (( lane_count > 10 )); then
            lane_count=10
          fi
          lanes="$(jq -cn --argjson count "${lane_count}" '[range(0; $count)]')"
          echo "claimable=${claimable}" >> "${GITHUB_OUTPUT}"
          echo "workers=${lanes}" >> "${GITHUB_OUTPUT}"
          echo "Manager research queue has ${claimable} claimable job(s); starting ${lane_count} lane(s)"

  research:
    name: Research artist managers ${{ matrix.lane }}
    needs: prepare
    if: ${{ needs.prepare.outputs.claimable != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        lane: ${{ fromJSON(needs.prepare.outputs.workers) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install worker dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Copilot CLI
        run: npm install --global @github/copilot@latest --no-audit --no-fund

      - name: Drain manager research queue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CONTACT_RESEARCH_WORKERS: "4"
          CONTACT_RESEARCH_LANE: ${{ matrix.lane }}
          CONTACT_RESEARCH_USAGE_DIR: ${{ runner.temp }}/contact-research-usage-${{ matrix.lane }}
        run: npm run contact-research:agent

      - name: Upload AI-credit usage
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: contact-research-usage-${{ github.run_id }}-${{ matrix.lane }}
          path: ${{ runner.temp }}/contact-research-usage-${{ matrix.lane }}/
          if-no-files-found: ignore
          retention-days: 7

  usage:
    name: Summarize manager research AI credits
    needs: [prepare, research]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.claimable != '0' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create AI-credit directory
        run: mkdir -p "${RUNNER_TEMP}/contact-research-usage"

      - name: Download AI-credit usage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: contact-research-usage-${{ github.run_id }}-*
          path: ${{ runner.temp }}/contact-research-usage

      - name: Print AI-credit summary
        run: node scripts/summarize-contact-research-usage.mjs "${RUNNER_TEMP}/contact-research-usage"

name: Cleanup contact research probes

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type CLEANUP_RESEARCH_PROBES to authorize the manifest cleanup
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cleanup-contact-research-probes-production
  cancel-in-progress: false

jobs:
  cleanup:
    if: >-
      github.repository == 'zspherez/photo-admin' &&
      github.ref == 'refs/heads/main' &&
      github.workflow_ref == 'zspherez/photo-admin/.github/workflows/cleanup-contact-research-probes.yml@refs/heads/main' &&
      inputs.confirmation == 'CLEANUP_RESEARCH_PROBES'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          persist-credentials: false

      - name: Verify trusted checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify database target binding
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run db:verify-targets -- --require-all-migrations

      - name: Dry-run cleanup manifest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx scripts/cleanup-contact-research-probes.ts --dry-run

      - name: Apply cleanup manifest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CLEANUP_CONFIRMATION: ${{ inputs.confirmation }}
        run: >-
          npx tsx scripts/cleanup-contact-research-probes.ts
          --apply
          --confirmation "$CLEANUP_CONFIRMATION"

      - name: Verify cleanup manifest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx scripts/cleanup-contact-research-probes.ts --verify

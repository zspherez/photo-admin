name: Dispatch scheduled outreach

on:
  schedule:
    # 09:00 America/New_York is 13:00 UTC in EDT and 14:00 UTC in EST.
    # The remaining runs provide bounded recovery for delayed or failed dispatches.
    - cron: "*/15 13-15 * * 1-5"
    # Keep automatic retries moving evenings and weekends while limiting idle runs.
    - cron: "17 */4 * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: photo-admin-send-scheduled
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispatch due outreach
        shell: bash
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [[ -z "${APP_BASE_URL}" || -z "${CRON_SECRET}" ]]; then
            echo "::error::APP_BASE_URL and CRON_SECRET repository secrets are required"
            exit 1
          fi

          attempt=1
          delay=60
          response_polls=0
          max_response_polls=8
          terminal_failures_seen=0
          deadline=$((SECONDS + 15 * 60))
          endpoint="${APP_BASE_URL%/}/api/cron/send-scheduled"
          curl_bin="${CURL_BIN:-curl}"
          sleep_bin="${SLEEP_BIN:-sleep}"
          date_bin="${DATE_BIN:-date}"

          while (( SECONDS < deadline )); do
            remaining=$((deadline - SECONDS))
            request_timeout=75
            if (( remaining < request_timeout )); then
              request_timeout="${remaining}"
            fi

            echo "Outreach dispatch attempt ${attempt}"
            response=""
            if response="$(
              "${curl_bin}" \
                --fail-with-body \
                --silent \
                --show-error \
                --connect-timeout 15 \
                --max-time "${request_timeout}" \
                --write-out $'\n__PHOTO_ADMIN_HTTP_STATUS__:%{http_code}' \
                --header "Authorization: Bearer ${CRON_SECRET}" \
                --header "Accept: application/json" \
                "${endpoint}"
            )"; then
              curl_status=0
            else
              curl_status=$?
            fi

            marker="${response##*$'\n'}"
            if [[ "${marker}" == __PHOTO_ADMIN_HTTP_STATUS__:* ]]; then
              http_status="${marker#*:}"
              body="${response%$'\n'*}"
            else
              http_status="000"
              body="${response}"
            fi
            if [[ -n "${body}" ]]; then
              printf '%s\n' "${body}"
            fi

            structured_response=false
            if [[ "${http_status}" =~ ^[25][0-9]{2}$ ]] && [[ -n "${body}" ]]; then
              if dispatch_state="$(
                jq -er '
                  [
                    ((.terminalFailures // 0) |
                      if type == "number" and . >= 0 then floor
                      else error("invalid terminalFailures")
                      end),
                    ((.retryableFailures // 0) |
                      if type == "number" and . >= 0 then floor
                      else error("invalid retryableFailures")
                      end),
                    ((.unscheduledRetryableFailures // 0) |
                      if type == "number" and . >= 0 then floor
                      else error("invalid unscheduledRetryableFailures")
                      end),
                    ((.retriesScheduled // 0) |
                      if type == "number" and . >= 0 then floor
                      else error("invalid retriesScheduled")
                      end),
                    ((.scheduledRetries // 0) |
                      if type == "number" and . >= 0 then floor
                      else error("invalid scheduledRetries")
                      end),
                    ((.pendingClaims // 0) |
                      if type == "number" and . >= 0 then floor
                      else error("invalid pendingClaims")
                      end),
                    ((.bounded // false) |
                      if type == "boolean" then tostring
                      else error("invalid bounded")
                      end),
                    ((.nextRetryAt // "__none__") |
                      if type == "string" then .
                      else error("invalid nextRetryAt")
                      end),
                    ((.nextClaimExpiryAt // "__none__") |
                      if type == "string" then .
                      else error("invalid nextClaimExpiryAt")
                      end),
                    (.state |
                      if . == "complete" or
                        . == "pending_claims" or
                        . == "scheduled_retries" or
                        . == "retryable_failure" or
                        . == "terminal_failure" or
                        . == "bounded"
                      then .
                      else error("invalid state")
                      end),
                    (.complete |
                      if type == "boolean" then tostring
                      else error("invalid complete")
                      end),
                    ((.ok // false) |
                      if type == "boolean" then tostring
                      else error("invalid ok")
                      end)
                  ] | @tsv
                ' <<<"${body}"
              )"; then
                structured_response=true
              fi
            fi

            if [[ "${structured_response}" == "true" ]]; then
              IFS=$'\t' read -r \
                terminal_failures \
                retryable_failures \
                unscheduled_retryable_failures \
                retries_scheduled \
                scheduled_retries \
                pending_claims \
                bounded \
                next_retry_at \
                next_claim_expiry_at \
                dispatch_state_name \
                dispatch_complete \
                dispatch_ok <<<"${dispatch_state}"

              if {
                [[ "${dispatch_state_name}" == "complete" ]] &&
                  [[ "${dispatch_complete}" != "true" ]]
              } || {
                [[ "${dispatch_state_name}" != "complete" ]] &&
                  [[ "${dispatch_complete}" != "false" ]]
              }; then
                echo "::error::Outreach dispatch contradicted its completion state"
                exit 1
              fi

              if (( terminal_failures > 0 )); then
                terminal_failures_seen=$((terminal_failures_seen + terminal_failures))
                echo "::error::Outreach dispatch reported ${terminal_failures} terminal row failure(s)"
              fi

              pending=false
              if [[ "${dispatch_state_name}" != "complete" ]]; then
                pending=true
              fi

              if [[ "${pending}" != "true" ]]; then
                if (( terminal_failures_seen > 0 )); then
                  echo "::error::Outreach dispatch completed with ${terminal_failures_seen} terminal row failure(s)"
                  exit 1
                fi
                if [[ "${dispatch_ok}" != "true" ]]; then
                  echo "::error::Outreach dispatch returned a terminal scheduler state"
                  exit 1
                fi
                echo "Outreach dispatch succeeded with HTTP ${http_status}"
                exit 0
              fi

              if (( response_polls >= max_response_polls )) &&
                (( pending_claims == 0 && unscheduled_retryable_failures == 0 )); then
                if (( terminal_failures_seen > 0 )); then
                  echo "::error::Outreach retries remain after terminal row failures were reported"
                  exit 1
                fi
                if (( unscheduled_retryable_failures > 0 )); then
                  echo "::error::Outreach dispatcher retries did not recover within the response-aware polling window"
                  exit 1
                fi
                echo "::warning::Outreach retries or backlog remain after ${max_response_polls} response-aware polls; the four-hour safety schedule will continue recovery"
                exit 0
              fi

              delay=60
              poll_delay=15
              next_poll_at=""
              if (( pending_claims > 0 )) &&
                [[ "${next_claim_expiry_at}" != "__none__" ]]; then
                next_poll_at="${next_claim_expiry_at}"
              elif (( scheduled_retries > 0 )) &&
                [[ "${next_retry_at}" != "__none__" ]]; then
                next_poll_at="${next_retry_at}"
              fi
              if [[ "${bounded}" != "true" && -n "${next_poll_at}" ]]; then
                retry_epoch="$("${date_bin}" --date="${next_poll_at}" +%s 2>/dev/null || true)"
                now_epoch="$("${date_bin}" -u +%s)"
                if [[ "${retry_epoch}" =~ ^[0-9]+$ ]] &&
                  (( retry_epoch > now_epoch )); then
                  poll_delay=$((retry_epoch - now_epoch + 5))
                fi
                if (( poll_delay < 15 )); then
                  poll_delay=15
                elif (( poll_delay > 300 )); then
                  poll_delay=300
                fi
              fi

              remaining=$((deadline - SECONDS))
              if (( remaining <= poll_delay + 30 )); then
                if (( terminal_failures_seen > 0 )); then
                  echo "::error::Outreach retry polling ended after terminal row failures were reported"
                  exit 1
                fi
                if (( unscheduled_retryable_failures > 0 )); then
                  echo "::error::Outreach dispatcher retries did not recover within the 15-minute polling window"
                  exit 1
                fi
                if (( pending_claims > 0 )); then
                  echo "::error::Outreach claims remained unresolved through the polling deadline"
                  exit 1
                fi
                echo "::warning::Outreach retries or backlog remain after the bounded response-aware polling window; the four-hour safety schedule will continue recovery"
                exit 0
              fi
              echo "::notice::Outreach state ${dispatch_state_name} remains pending; polling again in ${poll_delay}s"
              response_polls=$((response_polls + 1))
              "${sleep_bin}" "${poll_delay}"
              attempt=$((attempt + 1))
              continue
            fi

            if (( curl_status == 0 )) && [[ "${http_status}" =~ ^2[0-9]{2}$ ]]; then
              echo "::error::Outreach dispatch returned invalid scheduler JSON"
              exit 1
            fi

            retryable=false
            if (( curl_status == 22 )); then
              case "${http_status}" in
                408|409|425|429|500|502|503|504) retryable=true ;;
              esac
            else
              case "${curl_status}" in
                6|7|18|28|35|52|55|56|92) retryable=true ;;
              esac
            fi
            if [[ "${retryable}" != "true" ]]; then
              echo "::error::Outreach dispatch failed with non-retryable curl status ${curl_status} and HTTP ${http_status}"
              exit 1
            fi

            remaining=$((deadline - SECONDS))
            if (( remaining <= delay )); then
              break
            fi
            echo "::warning::Outreach dispatch attempt ${attempt} failed with curl status ${curl_status} and HTTP ${http_status}; retrying in ${delay}s"
            "${sleep_bin}" "${delay}"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
            if (( delay > 300 )); then
              delay=300
            fi
          done

          echo "::error::Outreach dispatch did not succeed within the 15-minute maintenance retry window"
          exit 1

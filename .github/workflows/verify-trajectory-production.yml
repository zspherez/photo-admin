name: Verify trajectory production

on:
  workflow_dispatch:
    inputs:
      revision:
        description: Exact current main SHA to verify
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: verify-trajectory-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate trusted main revision
    runs-on: ubuntu-latest
    outputs:
      revision: ${{ steps.revision.outputs.revision }}
    steps:
      - name: Check out trusted main without credentials
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          persist-credentials: false
      - name: Validate requested revision
        id: revision
        env:
          REQUESTED_REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          actual_revision="$(git rev-parse HEAD)"
          if [[ ! "$REQUESTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::revision must be a full lowercase commit SHA"
            exit 1
          fi
          if [[ "$REQUESTED_REVISION" != "$actual_revision" ]]; then
            echo "::error::revision must equal current main"
            exit 1
          fi
          echo "revision=$actual_revision" >> "$GITHUB_OUTPUT"

  verify:
    name: Query read-only trajectory state
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Check out validated main revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.revision }}
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify production trajectory state read-only
        run: npm run trajectory:production:verify

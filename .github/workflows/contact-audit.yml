name: Audit existing manager contacts

on:
  schedule:
    # Poll every 10 minutes; the app only starts work for an explicit request.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  copilot-requests: write
  id-token: write

concurrency:
  group: photo-admin-contact-audit
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      requested: ${{ steps.queue.outputs.requested }}
      claimable: ${{ steps.queue.outputs.claimable }}
      workers: ${{ steps.queue.outputs.workers }}
      run_id: ${{ steps.queue.outputs.run_id }}
    steps:
      - name: Poll requested contact audit work
        id: queue
        shell: bash
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          REQUEST_FULL_AUDIT: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ -z "${APP_BASE_URL}" ]]; then
            echo "::error::APP_BASE_URL repository secret is required"
            exit 1
          fi

          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          separator="?"
          if [[ "${oidc_url}" == *"?"* ]]; then
            separator="&"
          fi
          oidc_token="$(
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              --header "Accept: application/json" \
              "${oidc_url}${separator}audience=photo-admin-contact-audit" |
              jq -er '.value | select(type == "string" and length > 0)'
          )"
          echo "::add-mask::${oidc_token}"

          result="$(
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --connect-timeout 15 \
              --max-time 120 \
              --request POST \
              --header "Authorization: Bear""er ${oidc_token}" \
              --header "Content-Type: application/json" \
              --header "Accept: application/json" \
              --data "$(
                jq -cn \
                  --arg workflowRunId "${GITHUB_RUN_ID}" \
                  --argjson requestFullAudit "${REQUEST_FULL_AUDIT}" \
                  '{workflowRunId: $workflowRunId, requestFullAudit: $requestFullAudit}'
              )" \
              "${APP_BASE_URL%/}/api/contact-audit/prepare"
          )"
          requested="$(
            jq -r '
              if (.requested | type) == "boolean"
              then (.requested | tostring)
              else error("invalid requested boolean")
              end
            ' <<<"${result}"
          )"
          claimable="$(jq -er '.claimable | numbers | select(. >= 0 and floor == .)' <<<"${result}")"
          contact_count="$(jq -er '.contactCount | numbers | select(. >= 0 and floor == .)' <<<"${result}")"
          resumed="$(
            jq -r '
              if (.resumed | type) == "boolean"
              then (.resumed | tostring)
              else error("invalid resumed boolean")
              end
            ' <<<"${result}"
          )"
          run_id=""
          if [[ "${requested}" == "true" ]]; then
            run_id="$(jq -er '.runId | strings | select(length > 0)' <<<"${result}")"
          elif (( claimable != 0 || contact_count != 0 )); then
            echo "::error::No-request preflight returned audit work"
            exit 1
          fi
          lane_count="${claimable}"
          if (( lane_count > 10 )); then
            lane_count=10
          fi
          lanes="$(jq -cn --argjson count "${lane_count}" '[range(0; $count)]')"
          echo "requested=${requested}" >> "${GITHUB_OUTPUT}"
          echo "claimable=${claimable}" >> "${GITHUB_OUTPUT}"
          echo "workers=${lanes}" >> "${GITHUB_OUTPUT}"
          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          if [[ "${requested}" == "true" ]]; then
            echo "Audit ${run_id}: ${contact_count} contact(s), ${claimable} claimable, resumed=${resumed}"
          else
            echo "No contact audit request is pending; schedule tick is a no-op"
          fi

  audit:
    name: Audit contacts ${{ matrix.lane }}
    needs: prepare
    if: ${{ needs.prepare.outputs.requested == 'true' && needs.prepare.outputs.claimable != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        lane: ${{ fromJSON(needs.prepare.outputs.workers) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install worker dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Copilot CLI
        run: npm install --global @github/copilot@latest --no-audit --no-fund

      - name: Drain contact audit queue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CONTACT_AUDIT_WORKERS: "4"
          CONTACT_AUDIT_LANE: ${{ matrix.lane }}
          CONTACT_AUDIT_USAGE_DIR: ${{ runner.temp }}/contact-audit-usage-${{ matrix.lane }}
        run: npm run contact-audit:agent

      - name: Upload AI-credit usage
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: contact-audit-usage-${{ github.run_id }}-${{ matrix.lane }}
          path: ${{ runner.temp }}/contact-audit-usage-${{ matrix.lane }}/
          if-no-files-found: ignore
          retention-days: 7

  recover:
    name: Requeue failed contact audit attempt
    needs: [prepare, audit]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.requested == 'true' && needs.prepare.outputs.claimable != '0' && needs.audit.result != 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Release failed claims for retry
        shell: bash
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CONTACT_AUDIT_RUN_ID: ${{ needs.prepare.outputs.run_id }}
        run: |
          set -euo pipefail

          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          separator="?"
          if [[ "${oidc_url}" == *"?"* ]]; then
            separator="&"
          fi
          oidc_token="$(
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              --header "Accept: application/json" \
              "${oidc_url}${separator}audience=photo-admin-contact-audit" |
              jq -er '.value | select(type == "string" and length > 0)'
          )"
          echo "::add-mask::${oidc_token}"

          payload="$(
            jq -cn \
              --arg runId "${CONTACT_AUDIT_RUN_ID}" \
              --arg workflowRunId "${GITHUB_RUN_ID}" \
              --arg error "GitHub Actions audit workers did not complete successfully (run ${GITHUB_RUN_ID})" \
              '{runId: $runId, workflowRunId: $workflowRunId, error: $error}'
          )"
          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --connect-timeout 15 \
            --max-time 120 \
            --request POST \
            --header "Authorization: Bear""er ${oidc_token}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "${payload}" \
            "${APP_BASE_URL%/}/api/contact-audit/attempt" |
            jq -e '.ok == true'

  usage:
    name: Summarize contact audit AI credits
    needs: [prepare, audit]
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.claimable != '0' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create AI-credit directory
        run: mkdir -p "${RUNNER_TEMP}/contact-audit-usage"

      - name: Download AI-credit usage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: contact-audit-usage-${{ github.run_id }}-*
          path: ${{ runner.temp }}/contact-audit-usage

      - name: Print AI-credit summary
        run: node scripts/summarize-contact-research-usage.mjs "${RUNNER_TEMP}/contact-audit-usage"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#09090b" />
    <title>Photo Admin is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #fafafa;
        color: #18181b;
      }
      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(1.5rem, env(safe-area-inset-top))
          max(1.5rem, env(safe-area-inset-right))
          max(1.5rem, env(safe-area-inset-bottom))
          max(1.5rem, env(safe-area-inset-left));
        box-sizing: border-box;
      }
      main {
        width: min(100%, 28rem);
        border: 1px solid #d4d4d8;
        border-radius: 1rem;
        background: #fff;
        padding: 1.5rem;
        box-sizing: border-box;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.06);
      }
      img {
        width: auto;
        height: 2rem;
      }
      h1 {
        margin: 1.25rem 0 0.5rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        color: #71717a;
        line-height: 1.5;
      }
      button {
        width: 100%;
        min-height: 2.75rem;
        margin-top: 1.25rem;
        border: 0;
        border-radius: 0.5rem;
        background: #18181b;
        color: #fff;
        font: inherit;
        font-weight: 600;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #09090b;
          color: #fafafa;
        }
        main {
          border-color: #27272a;
          background: #18181b;
        }
        p {
          color: #a1a1aa;
        }
        button {
          background: #fafafa;
          color: #18181b;
        }
        img {
          filter: invert(1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.svg" alt="" />
      <h1>You’re offline</h1>
      <p>
        Photo Admin requires a secure network connection. Admin pages, account
        data, and mutations are never stored for offline use.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
